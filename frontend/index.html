<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F-1 Scholar Tax Navigator</title>
    <meta name="description" content="An AI-powered tax assistant for F-1 scholars referencing the 2025 IRS rules.">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-background">
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>
    </div>
    
    <div class="app-container">
        <header class="header">
            <div class="header-titles">
                <h1>F-1 Tax Navigator</h1>
                <p>2025 IRS Tax Guidance built on Official Publications</p>
            </div>
            <div class="header-actions">
                <button id="reset-btn" class="btn btn-secondary">Reset Chat</button>
            </div>
        </header>
        
        <main class="chat-container" id="chat-container" role="log" aria-live="polite">
            <div class="message system">
                <div class="avatar">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="10" rx="2"></rect><circle cx="12" cy="5" r="2"></circle><path d="M12 7v4"></path></svg>
                </div>
                <div class="message-content glass-panel">
                    <p>Welcome to the F-1 Scholar Tax Navigator!</p>
                    <p>To provide accurate advice on residency, what was your initial date of entry into the U.S. on your visa? (Format: YYYY-MM-DD)</p>
                    <div class="onboarding-actions" id="onboarding-controls">
                        <input type="date" id="entry-date-input" class="date-input" />
                        <button id="save-date-btn" class="btn btn-primary">Save Date</button>
                        <button id="skip-date-btn" class="btn btn-text">Skip</button>
                    </div>
                </div>
            </div>
        </main>
        
        <footer class="input-area glass-panel">
            <textarea id="user-input" placeholder="Ask your tax question... (e.g. Do I need to file Form 8843?)" rows="1" disabled aria-label="Chat input"></textarea>
            <button id="send-btn" class="send-btn" disabled aria-label="Send message">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </footer>
    </div>

    <!-- Template for Source Citations -->
    <template id="source-template">
        <div class="source-citation">
            <button class="source-toggle">
                <span class="source-title"></span>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="chevron"><polyline points="6 9 12 15 18 9"></polyline></svg>
            </button>
            <div class="source-content" style="display: none;">
                <p class="source-text"></p>
                <div class="source-meta"></div>
            </div>
        </div>
    </template>

    <script src="script.js"></script>
</body>
</html>
